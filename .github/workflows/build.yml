name: Build TAF-EB Portátil

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # permite rodar manualmente pelo site do GitHub

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Gerar TAF-EB-Portatil.exe
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publicar executável
        uses: actions/upload-artifact@v4
        with:
          name: TAF-EB-Portatil
          path: dist/TAF-EB-Portatil.exe
          retention-days: 90

      - name: Criar Release automática
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/TAF-EB-Portatil.exe
          name: TAF-EB ${{ github.ref_name }}
          body: |
            ## TAF-EB — Sistema de Avaliação Física EB

            ### Como usar
            1. Baixe o arquivo `TAF-EB-Portatil.exe`
            2. Clique duas vezes para abrir
            3. Nenhuma instalação necessária

            ### Requisitos
            - Windows 10 ou superior (64 bits)
